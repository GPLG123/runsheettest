<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Driver Daily Report - BEN</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial, sans-serif; margin: 20px; }
label { font-weight: bold; margin-top: 10px; display: block; }
input, select, textarea { margin-top:4px; margin-bottom:10px; padding:6px; width:220px; box-sizing:border-box;}
textarea { width:100%; height:40px; resize:vertical;}
button { padding:8px 15px; margin-top:10px; cursor:pointer;}
table { width:100%; border-collapse: collapse; margin-top:20px; font-size:14px;}
th, td { border:1px solid #888; padding:6px 8px; text-align:center;}
th { background-color:#eee; }
.short { width:120px;}
#alertExcel { margin-top:15px; background-color:#f8d7da; border:1px solid #f5c6cb; color:#721c24; padding:10px; font-weight:bold; }
.deleteBtn { background-color:#dc3545; color:white; border:none; padding:4px 8px; cursor:pointer; border-radius:3px; }
</style>
</head>
<body>

<h2>Driver Daily Report - BEN</h2>

<label>Vehicle:</label>
<input type="text" id="vehicle" />

<label>Run #:</label>
<input type="text" id="run" />

<hr />

<label>Collection and Delivery Specification:</label>
<select id="specification">
  <option value="">Select specification</option>
  <option>Collection</option>
  <option>Delivery</option>
  <option>Collection & Delivery</option>
</select>

<label>Collection and Delivery Point:</label>
<select id="location">
  <option value="">Select</option>
  <option>AC</option>
  <option>ASC</option>
  <option>BA WC</option>
  <option>BA WC 2nd</option>
  <option>Ba XPS</option>
  <option>DAI</option>
  <option>Dnata CP</option>
  <option>Dnata CX</option>
  <option>Dnata U1</option>
  <option>Dnata U2</option>
  <option>Dnata U3</option>
  <option>Dnata VS/Delta</option>
  <option>HCH</option>
  <option>HCH Horton</option>
  <option>JL</option>
  <option>Royal Mail</option>
  <option>LANDMARK GLOBAL</option>
  <option>MW</option>
  <option>Scylla Rd</option>
  <option>Scylla U1</option>
  <option>WFS 549</option>
  <option>WFS 550</option>
  <option>ECMS</option>
  <option>Swissport</option>
  <option>BREAK</option>
  <option value="manual">Other (Manual)</option>
</select>

<input type="text" id="manualLocation" placeholder="Enter manual location" style="display:none; width:220px;">

<label>Arrival Time:</label>
<input type="time" id="arrival" />

<label>Booking Time:</label>
<input type="time" id="booking" />

<label>Departure:</label>
<input type="time" id="departure" />

<label>QTY:</label>
<input type="text" id="qty" placeholder="Enter QTY (optional)" />

<label>Comment:</label>
<textarea id="comment"></textarea>

<button id="addEntryBtn">Add Location</button>

<hr />

<label>Select Date to View / Generate Excel:</label>
<input type="date" id="filterDate" />

<div id="alertExcel">
⚠️ After adding all locations click <strong>Send Excel</strong>
</div>

<button id="sendExcelBtn">Send Excel</button>

<table id="reportTable">
<thead>
<tr>
<th>Date</th>
<th>Vehicle</th>
<th>Run</th>
<th>Location</th>
<th>Arrival</th>
<th>Booking</th>
<th>Departure</th>
<th>QTY</th>
<th>Specification</th>
<th>Comment</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const HOURLY_RATE = 37.5;

let dailyData = JSON.parse(localStorage.getItem('dailyData') || "{}");

const locationSelect = document.getElementById('location');
const manualLocationInput = document.getElementById('manualLocation');

locationSelect.addEventListener('change', () => {
  manualLocationInput.style.display = (locationSelect.value === 'manual') ? 'block' : 'none';
});

function timeToMinutes(t){
  if(!t) return null;
  const [h,m] = t.split(":").map(Number);
  return h*60+m;
}

/* ROUND TO NEAREST 30 MINUTES WITH 15-MINUTE MARGIN */
function roundTo30(mins){
  let r = mins % 30;
  return (r < 15) ? mins - r : mins + (30 - r);
}

function loadTable(date = filterDate.value){
  const tbody = document.querySelector("#reportTable tbody");
  tbody.innerHTML="";
  const runFilter = run.value.trim();
  if(!dailyData[date]) return;
  Object.keys(dailyData[date]).forEach(runKey=>{
    if(runFilter && runKey !== runFilter) return;
    dailyData[date][runKey].forEach((entry,idx)=>{
      const row = tbody.insertRow();
      row.insertCell().textContent = entry.date;
      row.insertCell().textContent = entry.vehicle;
      row.insertCell().textContent = entry.run;
      row.insertCell().textContent = entry.location;
      row.insertCell().textContent = entry.arrival;
      row.insertCell().textContent = entry.booking;
      row.insertCell().textContent = entry.departure;
      row.insertCell().textContent = entry.qty;
      row.insertCell().textContent = entry.specification;
      row.insertCell().textContent = entry.comment;

      const actionCell = row.insertCell();
      const delBtn = document.createElement('button');
      delBtn.textContent = "Delete";
      delBtn.className="deleteBtn";
      delBtn.onclick = ()=>{
        dailyData[date][runKey].splice(idx,1);
        localStorage.setItem('dailyData',JSON.stringify(dailyData));
        loadTable(date);
      };
      actionCell.appendChild(delBtn);
    });
  });
}

filterDate.addEventListener('change',()=>loadTable(filterDate.value));
run.addEventListener('input',()=>loadTable(filterDate.value));

addEntryBtn.addEventListener('click',()=>{
  const vehicleVal = vehicle.value.trim();
  const runVal = run.value.trim();
  const date = new Date().toISOString().split('T')[0];
  const specificationVal = specification.value;
  let locationVal = (locationSelect.value==='manual') ? manualLocationInput.value.trim() : locationSelect.value;
  const arrivalVal = arrival.value;
  const bookingVal = booking.value;
  const departureVal = departure.value;
  const qtyVal = qty.value.trim() || "";
  const commentVal = comment.value.trim();

  if(!vehicleVal || !runVal || !locationVal || !specificationVal) return alert("Fill required fields");

  if(!dailyData[date]) dailyData[date]={};
  if(!dailyData[date][runVal]) dailyData[date][runVal]=[];

  dailyData[date][runVal].push({
    date, vehicle:vehicleVal, run:runVal, location:locationVal,
    arrival:arrivalVal, booking:bookingVal, departure:departureVal,
    qty:qtyVal, specification:specificationVal, comment:commentVal
  });

  localStorage.setItem('dailyData',JSON.stringify(dailyData));
  loadTable(date);
});

sendExcelBtn.addEventListener('click',()=>{
  const selectedDate = filterDate.value;
  const runFilter = run.value.trim();
  if(!dailyData[selectedDate]) return alert("No data for date");

  let rows=[];
  Object.keys(dailyData[selectedDate]).forEach(runKey=>{
    if(runFilter && runKey!==runFilter) return;
    dailyData[selectedDate][runKey].forEach(entry=>{
      rows.push([
        entry.date, entry.vehicle, entry.run, entry.location,
        entry.arrival, entry.booking, entry.departure,
        entry.qty, entry.specification, entry.comment
      ]);
    });
  });

  if(rows.length===0) return alert("No data");

  /* CALCULATE TOTAL HOURS FROM EARLIEST TO LATEST TIME */
  let allTimes = [];
  rows.forEach(r=>{
    let arrival = timeToMinutes(r[4]);
    let departure = timeToMinutes(r[6]);
    if(arrival !== null) allTimes.push(arrival);
    if(departure !== null) allTimes.push(departure);
  });

  let totalMinutes = 0;
  if(allTimes.length){
    let earliestTime = Math.min(...allTimes);
    let latestTime = Math.max(...allTimes);
    totalMinutes = latestTime - earliestTime;
    totalMinutes = roundTo30(totalMinutes);
  }
  let totalHours = totalMinutes / 60;
  let totalCost = totalHours * HOURLY_RATE;

  const sheetData=[
    ["TOTAL HOURS",totalHours],
    ["HOURLY RATE (£)",HOURLY_RATE],
    ["TOTAL COST (£)",totalCost],
    [],
    ["Date","Vehicle","Run","Location","Arrival","Booking","Departure","QTY","Specification","Comment"],
    ...rows
  ];

  const ws = XLSX.utils.aoa_to_sheet(sheetData);
  ws["B1"].z="0.00"; ws["B2"].z="£0.00"; ws["B3"].z="£0.00";

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Daily Report");

  let fileName = `Driver_Report_${selectedDate}`;
  if(runFilter) fileName += `_Run_${runFilter}`;
  XLSX.writeFile(wb,fileName+".xlsx");
});

window.onload=function(){
  filterDate.value=new Date().toISOString().split('T')[0];
  loadTable();
};
</script>

</body>
</html>
