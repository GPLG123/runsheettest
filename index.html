<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Driver Daily Report ATR</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; }
label { font-weight: bold; margin-top: 10px; display: block; }
input[type="text"], input[type="time"], select, textarea { margin-top:4px; margin-bottom:10px; padding:6px; width:220px; box-sizing:border-box;}
textarea { width:100%; height:40px; resize:vertical;}
button { padding:8px 15px; margin-top:10px; cursor:pointer;}
table { width:100%; border-collapse: collapse; margin-top:20px; font-size:14px;}
th, td { border:1px solid #888; padding:6px 8px; text-align:center;}
th { background-color:#eee; }

th:nth-child(4), td:nth-child(4) { width:120px; }
th:nth-child(8), td:nth-child(8) { width:120px; }
th:nth-child(10), td:nth-child(10) { width:350px; }

.short { width:120px;}
#alertExcel { margin-top:15px; background-color:#f8d7da; border:1px solid #f5c6cb; color:#721c24; padding:10px; font-weight:bold; }
</style>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<h2>Driver Daily Report ATR</h2>

<label for="vehicle">Vehicle:</label>
<input type="text" id="vehicle" class="short" placeholder="Vehicle">

<label for="run">Run:</label>
<input type="text" id="run" class="short" placeholder="Run #">

<hr>

<label for="specification">Collection and Delivery Specification:</label>
<select id="specification" required>
<option value="">Select specification</option>
<option value="Collection">Collection</option>
<option value="Delivery">Delivery</option>
<option value="Collection & Delivery">Collection & Delivery</option>
</select>

<label for="location">Collection and Delivery Point:</label>
<select id="location" required>
<option value="">Select</option>
<option value="AC">AC</option>
<option value="ASC">ASC</option>
<option value="BA WC">BA WC</option>
<option value="BA WC 2nd">BA WC 2nd</option>
<option value="Ba XPS">Ba XPS</option>
<option value="DAI">DAI</option>
<option value="Dnata CP">Dnata CP</option>
<option value="Dnata CX">Dnata CX</option>
<option value="Dnata U1">Dnata U1</option>
<option value="Dnata U2">Dnata U2</option>
<option value="Dnata U3">Dnata U3</option>
<option value="Dnata VS/Delta">Dnata VS/Delta</option>
<option value="HCH">HCH</option>
<option value="HCH Horton">HCH Horton</option>
<option value="JL">JL</option>
<option value="LG">LG</option>
<option value="LANDMARK GLOBAL">LANDMARK GLOBAL</option>
<option value="MW">MW</option>
<option value="Scylla Rd">Scylla Rd</option>
<option value="Scylla U1">Scylla U1</option>
<option value="WFS 549">WFS 549</option>
<option value="WFS 550">WFS 550</option>
<option value="ECMS">ECMS</option>
<option value="Swissport">Swissport</option>
<option value="BREAK">BREAK</option>
<option value="manual">Other (Manual)</option>
</select>

<input type="text" id="manualLocation" placeholder="Enter manual location" style="display:none; margin-top:6px; width:220px;">

<label for="arrival">Arrival Time:</label>
<input type="time" id="arrival">

<label for="booking">Booking Time:</label>
<input type="time" id="booking">

<label for="departure">Departure:</label>
<input type="time" id="departure">

<label for="qty">Qty:</label>
<input type="text" id="qty" class="short">

<label for="comment">Comment:</label>
<textarea id="comment" placeholder="Add comment"></textarea>

<button id="addEntryBtn" type="button">Add Location</button>

<hr>

<label for="filterDate">Select Date to View / Generate Excel:</label>
<input type="date" id="filterDate" class="short">

<div id="alertExcel">
⚠️ Important: After adding all locations, make sure to click <strong>Send Excel</strong> to save your daily report locally! ⚠️
</div>

<button id="sendExcelBtn" type="button">Send Excel</button>

<table id="reportTable">
<thead>
<tr>
<th>Date</th>
<th>Vehicle</th>
<th>Run</th>
<th>Collection and Delivery Point</th>
<th>Arrival Time</th>
<th>Booking Time</th>
<th>Departure</th>
<th>Collection and Delivery Specification</th>
<th>Qty</th>
<th>Comment</th>
<th>Delete</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

const STORAGE_KEY = "ATR_dailyData";
let dailyData = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");

const locationSelect = document.getElementById('location');
const manualLocationInput = document.getElementById('manualLocation');

locationSelect.addEventListener('change', ()=>{
  manualLocationInput.style.display = (locationSelect.value === 'manual') ? 'block' : 'none';
});

function loadTable(date = filterDate.value){

  const tbody = document.querySelector("#reportTable tbody");
  tbody.innerHTML = "";
  const runKey = run.value.trim();

  if(!dailyData[date]) return;

  Object.keys(dailyData[date]).forEach(runNum=>{
    if(runKey && runNum!==runKey) return;

    dailyData[date][runNum].forEach(entry=>{
      const row = tbody.insertRow();
      
      Object.values(entry).forEach(value=>{
        const cell = row.insertCell();
        cell.textContent = value;
        cell.contentEditable = false; // ⚠️ Make table cells non-editable
      });

      const deleteCell = row.insertCell();
      const btn = document.createElement("button");
      btn.textContent = "❌";

      btn.onclick = function(){
        if(confirm("⚠️ Atenție! Ștergerea acestui rând este permanentă. Ești sigur că vrei să ștergi această intrare?")) {
          dailyData[entry.date][entry.run] =
            dailyData[entry.date][entry.run].filter(e => e !== entry);

          if(dailyData[entry.date][entry.run].length === 0){
            delete dailyData[entry.date][entry.run];
          }

          localStorage.setItem(STORAGE_KEY, JSON.stringify(dailyData));
          loadTable(entry.date);
        }
      };

      deleteCell.appendChild(btn);
    });
  });
}

function populateFilterDate(){
  const dates = Object.keys(dailyData).sort();
  if(dates.length) filterDate.value = dates[0];
}

addEntryBtn.addEventListener('click', ()=>{
  const vehicleVal = vehicle.value.trim();
  const runVal = run.value.trim();
  const dateVal = new Date().toISOString().split('T')[0];
  const specificationVal = specification.value;
  let locationVal = (locationSelect.value==='manual') ? manualLocationInput.value.trim() : locationSelect.value;
  const arrivalVal = arrival.value;
  const bookingVal = booking.value;
  const departureVal = departure.value;
  const qtyVal = qty.value.trim();
  const commentVal = comment.value.trim();

  if(!vehicleVal || !runVal || !locationVal || !specificationVal){
    alert("Please fill all required fields");
    return;
  }

  if(!dailyData[dateVal]) dailyData[dateVal] = {};
  if(!dailyData[dateVal][runVal]) dailyData[dateVal][runVal] = [];

  dailyData[dateVal][runVal].push({
    date: dateVal,
    vehicle: vehicleVal,
    run: runVal,
    location: locationVal,
    arrival: arrivalVal,
    booking: bookingVal,
    departure: departureVal,
    specification: specificationVal,
    qty: qtyVal,
    comment: commentVal
  });

  localStorage.setItem(STORAGE_KEY, JSON.stringify(dailyData));
  loadTable(dateVal);
});

filterDate.addEventListener('change', ()=>loadTable());
run.addEventListener('input', ()=>loadTable());

sendExcelBtn.addEventListener('click', ()=>{

  const dateVal = filterDate.value;
  const runFilter = run.value.trim();

  if(!dailyData[dateVal]) return alert("No data for this date");

  let rows = [];

  Object.keys(dailyData[dateVal]).forEach(runNum=>{
    if(runFilter && runNum!==runFilter) return;
    dailyData[dateVal][runNum].forEach(entry=>{
      rows.push([
        entry.date,
        entry.vehicle,
        entry.run,
        entry.location,
        entry.arrival,
        entry.booking,
        entry.departure,
        entry.specification,
        entry.qty,
        entry.comment
      ]);
    });
  });

  if(rows.length===0) return alert("No rows to export");

  const sheetData = [
    ["Date","Vehicle","Run","Location","Arrival","Booking","Departure","Specification","Qty","Comment"],
    ...rows
  ];

  const ws = XLSX.utils.aoa_to_sheet(sheetData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Daily Report");

  let fileName = "ATR_Driver_Report_"+dateVal;
  if(runFilter) fileName += "_Run_"+runFilter;

  XLSX.writeFile(wb, fileName+".xlsx");

});

window.onload = function(){
  populateFilterDate();
  if(!filterDate.value) filterDate.value = new Date().toISOString().split('T')[0];
  ['arrival','booking','departure'].forEach(id=>{
    if(!document.getElementById(id).value)
      document.getElementById(id).value = (id==='departure')?'09:00':'08:00';
  });
  loadTable();
};

</script>

</body>
</html>
